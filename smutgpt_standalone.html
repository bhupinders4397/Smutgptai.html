<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmutGPT — OpenRouter</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
body { font-family: Inter, sans-serif; }
</style>
</head>

<body class="bg-white dark:bg-black text-black dark:text-white">
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const App = () => {
  const [prompt, setPrompt] = useState("");
  const [messages, setMessages] = useState([]);
  const [apiKey, setApiKey] = useState(localStorage.getItem("OPENROUTER_KEY") || "");
  const [loading, setLoading] = useState(false);
  const [showSettings, setShowSettings] = useState(!apiKey);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, loading]);

  const send = async () => {
    if (!prompt.trim() || loading) return;

    if (!apiKey) {
      setShowSettings(true);
      return;
    }

    const userMsg = { role: "user", content: prompt };
    const updatedMessages = [...messages, userMsg];

    setMessages(updatedMessages);
    setPrompt("");
    setLoading(true);

    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json",
          "HTTP-Referer": window.location.href,
          "X-Title": "SmutGPT"
        },
        body: JSON.stringify({
          model: "mistralai/mistral-7b-instruct",
          messages: [
            {
              role: "system",
              content: "You are a bold and immersive creative writing assistant. Focus on storytelling, emotion, and vivid scenes."
            },
            ...updatedMessages.map(m => ({
              role: m.role === "user" ? "user" : "assistant",
              content: m.content
            }))
          ],
          temperature: 0.9,
          max_tokens: 1000
        })
      });

      const data = await res.json();
      const text = data.choices?.[0]?.message?.content || "No response.";

      setMessages(prev => [...prev, { role: "assistant", content: text }]);

    } catch (err) {
      setMessages(prev => [...prev, { role: "assistant", content: "Error connecting to OpenRouter." }]);
    }

    setLoading(false);
  };

  const saveKey = (key) => {
    localStorage.setItem("OPENROUTER_KEY", key);
    setApiKey(key);
    setShowSettings(false);
  };

  return (
    <div className="h-screen flex flex-col max-w-4xl mx-auto p-4">

      {/* Header */}
      <div className="flex justify-between items-center mb-4">
        <h1 className="text-2xl font-bold">SmutGPT</h1>
        <button onClick={() => setShowSettings(true)} className="text-sm opacity-70">Settings</button>
      </div>

      {/* Chat */}
      <div ref={scrollRef} className="flex-1 overflow-y-auto space-y-4 mb-4 p-4 bg-gray-100 dark:bg-gray-900 rounded-xl">

        {messages.length === 0 && (
          <div className="text-center opacity-40">Start writing your story...</div>
        )}

        {messages.map((m, i) => (
          <div key={i} className={m.role === "user" ? "text-right" : "text-left"}>
            <div className={`inline-block p-4 rounded-xl max-w-[80%] ${
              m.role === "user"
                ? "bg-purple-600 text-white"
                : "bg-white text-black"
            }`}>
              {m.content}
            </div>
          </div>
        ))}

        {loading && <div className="opacity-50">Writing...</div>}
      </div>

      {/* Input */}
      <div className="relative">
        <textarea
          value={prompt}
          onChange={e => setPrompt(e.target.value)}
          placeholder="Describe your scene..."
          className="w-full p-4 pr-16 rounded-xl bg-white text-black border"
          onKeyDown={(e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              send();
            }
          }}
        />
        <button
          onClick={send}
          className="absolute right-3 bottom-3 bg-purple-600 text-white px-4 py-2 rounded"
        >
          Send
        </button>
      </div>

      {/* Modal */}
      {showSettings && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center">
          <div className="bg-white text-black p-6 rounded-xl w-full max-w-sm">
            <h2 className="text-lg font-bold mb-2">OpenRouter API Key</h2>
            <input
              defaultValue={apiKey}
              id="keyInput"
              className="w-full border p-2 mb-4"
              placeholder="sk-or-..."
            />
            <div className="flex gap-2">
              <button onClick={() => setShowSettings(false)} className="flex-1 bg-gray-200 p-2 rounded">Cancel</button>
              <button
                onClick={() => saveKey(document.getElementById("keyInput").value)}
                className="flex-1 bg-purple-600 text-white p-2 rounded"
              >
                Save
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
